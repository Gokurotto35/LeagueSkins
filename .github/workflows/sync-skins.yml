name: Sync skins from upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download upstream catalog
        run: |
          curl -L -o upstream.zip https://github.com/Alban1911/LeagueSkins/archive/refs/heads/main.zip
          unzip -q upstream.zip -d upstream_extract
      - name: Sync skins / resources / previews
        run: |
          SRC=upstream_extract/LeagueSkins-main
          for d in skins resources previews; do
            if [ -d "$SRC/$d" ]; then
              mkdir -p "$d"
              rsync -a "$SRC/$d/" "$d/"
            fi
          done
          rm -rf upstream.zip upstream_extract
      - name: Commit changes
        run: |
          git config user.name "chameleon-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync skins from upstream ($(date -u +%Y-%m-%d))"
            git push
          fi
